<svg xmlns="http://www.w3.org/2000/svg" width="420" height="265" viewBox="0 0 420 265">
  <defs>
    <linearGradient id="gundefined" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <clipPath id="card-clip">
      <rect width="420" height="265" rx="18" ry="18"/>
    </clipPath>
  </defs>

  <!-- Card background -->
  <rect width="420" height="265" rx="18" ry="18" fill="url(#gundefined)"/>

  <!-- Decorative circles -->
  <circle cx="360" cy="225" r="110" fill="rgba(255,255,255,0.06)"/>
  <circle cx="400" cy="295" r="130" fill="rgba(255,255,255,0.04)"/>
  <circle cx="30" cy="30" r="80" fill="rgba(255,255,255,0.04)"/>

  <!-- Top stripe -->
  <rect x="0" y="0" width="420" height="6" rx="0" fill="rgba(255,255,255,0.15)"/>

  <!-- Chip -->
  
    <rect x="32" y="90" width="42" height="32" rx="5" ry="5" fill="#d4a827" opacity="0.95"/>
    <line x1="46" y1="90" x2="46" y2="122" stroke="#b8901e" stroke-width="1"/>
    <line x1="60" y1="90" x2="60" y2="122" stroke="#b8901e" stroke-width="1"/>
    <line x1="32" y1="101" x2="74" y2="101" stroke="#b8901e" stroke-width="1"/>
    <line x1="32" y1="111" x2="74" y2="111" stroke="#b8901e" stroke-width="1"/>
    <rect x="46" y="101" width="14" height="10" fill="#c49b20" rx="1"/>
  

  <!-- Contactless icon -->
  <g transform="translate(95, 98)" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2">
    <path d="M0,8 Q5,0 0,-8"/>
    <path d="M5,12 Q14,0 5,-12"/>
    <path d="M10,16 Q22,0 10,-16"/>
  </g>

  <!-- Bank name -->
  <text x="32" y="54" font-family="Arial, sans-serif" font-size="20" font-weight="700"
    fill="rgba(255,255,255,0.95)" letter-spacing="0.5">Commercial  International P.J.S.C</text>

  <!-- Card number placeholder -->
  <text x="32" y="175" font-family="Courier New, monospace" font-size="17" letter-spacing="3"
    fill="rgba(255,255,255,0.55)">•••• •••• •••• ••••</text>

  <!-- Labels -->
  <text x="32" y="215" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)"
    letter-spacing="1.5" text-transform="uppercase">CARD HOLDER</text>
  <text x="32" y="232" font-family="Arial, sans-serif" font-size="13" font-weight="600"
    fill="rgba(255,255,255,0.8)">•••••••••••••</text>

  <text x="295" y="215" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)"
    letter-spacing="1.5">EXPIRES</text>
  <text x="295" y="232" font-family="Arial, sans-serif" font-size="13" font-weight="600"
    fill="rgba(255,255,255,0.8)">••/••</text>

  <!-- Card type logo area (Visa-style circles) -->
  <circle cx="365" cy="42" r="22" fill="rgba(255,255,255,0.15)"/>
  <circle cx="385" cy="42" r="22" fill="rgba(255,255,255,0.1)"/>

  <!-- Bank code bottom right -->
  <text x="390" y="251" font-family="Arial, sans-serif" font-size="11" font-weight="700"
    fill="rgba(255,255,255,0.4)" text-anchor="end" letter-spacing="2"></text>
</svg>